---
- name: Disable swap
  command: swapoff -a
  become: yes
  changed_when: false
  when: disable_swap | bool

- name: Comment out swap entries in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s)'
    replace: '#\1'
  become: yes
  when: disable_swap | bool

- name: Load required kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  become: yes
  loop:
    - overlay
    - br_netfilter

- name: Ensure kernel modules are loaded at boot
  lineinfile:
    path: "{{ k8s_modules_config }}"
    line: "{{ item }}"
    create: yes
    state: present
  become: yes
  loop:
    - overlay
    - br_netfilter

- name: Configure kernel parameters for Kubernetes
  blockinfile:
    path: "{{ k8s_sysctl_config }}"
    block: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
  become: yes
  notify: reload sysctl

- name: Enable IP forwarding immediately
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    sysctl_set: yes
    reload: yes
  become: yes
  when: enable_ip_forward | bool

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes
