name: Deploy Sambandha's website

on:
  push:
    branches:
      - "features/sambandha"
jobs:
  docker_build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}
          password: ${{ secrets.SAMBANDHA_DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/my-site-sambandha:latest ./sites/sambandha
          docker push ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/my-site-sambandha:latest

  deploy:
    needs: docker_build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.SAMBANDHA_SERVER_USERNAME }}
          key: ${{ secrets.SAMBANDHA_SSH_KEY }}
          script: |
            docker pull ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/my-site-sambandha:latest
            docker stop sambandha-site || true
            docker rm sambandha-site || true
            docker run -d --name sambandha-site -p 9090:80 ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/my-site-sambandha:latest
