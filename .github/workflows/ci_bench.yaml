name: Deploy bench01 website

on:
  push:
    branches:
      - bench_01
  workflow_dispatch:

env:
  BENCH_HOST: ${{ secrets.BENCH_HOST }}
  BENCH_PORT: "22"
  BENCH_USER: ${{ secrets.BENCH01 }}
  BENCH_KEY: ${{ secrets.PRAVESH }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - name: Check DNS and SSH reachability
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${BENCH_HOST}" || -z "${BENCH_USER}" || -z "${BENCH_KEY}" ]]; then
            echo "Missing one or more required secrets: BENCH_HOST, BENCH01, PRAVESH"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! getent hosts "${BENCH_HOST}" > /dev/null; then
            echo "Host is not resolvable from runner: ${BENCH_HOST}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! timeout 5 bash -c "cat < /dev/null > /dev/tcp/${BENCH_HOST}/${BENCH_PORT}" 2>/dev/null; then
            echo "Host resolves, but SSH port is unreachable: ${BENCH_HOST}:${BENCH_PORT}"
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "can_deploy=true" >> "$GITHUB_OUTPUT"
jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -f sites/pravesh/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/pravesh:latest sites/pravesh
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pravesh:latest

  deploy:
    needs: preflight
    if: needs.preflight.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Copy files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.BENCH01 }}
          key: ${{ secrets.PRAVESH }}
          source: "./*"
          target: /opt/bench-01
      - name: Run Docker Compose on remote server
        run: |
          # Create SSH directory
          mkdir -p ~/.ssh

          # Write SSH key to file
          echo "${{ secrets.PRAVESH }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Add remote host to known_hosts to avoid prompt
          ssh-keyscan -H eef1df54591c.mylabserver.com >> ~/.ssh/known_hosts

          # Run Docker Compose remotely
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.BENCH01 }}@eef1df54591c.mylabserver.com \
            "cd /opt/bench-01 && docker compose up -d"