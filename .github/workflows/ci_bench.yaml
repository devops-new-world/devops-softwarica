name: Deploy Bench website

on:
  push:
    branches:
      - "bench_01"

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f sites/bench/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest sites/bench
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: pravesh
          key: ${{ secrets.PRAVESH }}
          port: 22
          source: "sites/bench/index.html"
          strip_components: 2
          target: "/var/www/html/bench/"
          overwrite: true