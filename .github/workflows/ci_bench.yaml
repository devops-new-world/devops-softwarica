name: Deploy Bench website

on:
  push:
    branches:
      - "bench_01"

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f sites/bench/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest sites/bench
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          SSH_HOST_CLEAN=$(printf '%s' "$SSH_HOST" | tr -d '\r\n' | xargs)
          if [ -z "$SSH_HOST_CLEAN" ]; then
            echo "SSH host secret is missing or empty"
            exit 1
          fi
          ssh-keyscan -H "$SSH_HOST_CLEAN" >> ~/.ssh/known_hosts
          echo "SSH_HOST_CLEAN=$SSH_HOST_CLEAN" >> "$GITHUB_ENV"

      - name: Prepare bench directory
        run: |
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes "$SSH_USER@$SSH_HOST_CLEAN" 'mkdir -p /var/www/html/bench && whoami && hostname && ls -ld /var/www/html/bench'

      - name: Copy landing page
        run: |
          scp -i ~/.ssh/id_rsa sites/bench/index.html "$SSH_USER@$SSH_HOST_CLEAN:/var/www/html/bench"