name: Deploy Bench website

on:
  push:
    branches:
      - "bench_01"

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -f sites/bench/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest sites/bench
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bench:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: copy files to temp via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.BENCH01 }}
          username: pravesh
          key: ${{ secrets.PRAVESH }}
          port: 22
          source: "sites/bench/index.html"
          strip_components: 2
          target: "/tmp/bench/"
          overwrite: true

      - name: Move landing page to web root
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BENCH01 }}
          username: pravesh
          key: ${{ secrets.PRAVESH }}
          port: 22
          script: |
            set -e
            if mkdir -p /var/www/html/bench 2>/dev/null && cp /tmp/bench/index.html /var/www/html/bench/index.html 2>/dev/null; then
              echo "Deployed with direct write permissions"
              exit 0
            fi

            if command -v sudo >/dev/null 2>&1; then
              sudo mkdir -p /var/www/html/bench
              sudo cp /tmp/bench/index.html /var/www/html/bench/index.html
              echo "Deployed using sudo"
              exit 0
            fi

            echo "Failed to deploy: user pravesh cannot write to /var/www/html/bench and sudo is unavailable."
            exit 1