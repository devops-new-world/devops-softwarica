name: Deploy My website

on:
  push:
    branches:
      - "features/rashmi"

jobs:
  docker_build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.RASHMI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.RASHMI_DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.RASHMI_DOCKERHUB_USERNAME }}/my-site-rashmi:latest ./sites/rashmi
          docker push ${{ secrets.RASHMI_DOCKERHUB_USERNAME }}/my-site-rashmi:latest

  deploy:
    needs: docker_build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.RASHMI_SERVER_USERNAME }}
          key: ${{ secrets.RASHMI_SSH_KEY }}
          script: |
            docker pull ${{ secrets.RASHMI_DOCKERHUB_USERNAME }}/my-site-rashmi:latest
            docker stop rashmi-site || true
            docker rm rashmi-site || true
            docker run -d --name rashmi-site -p 9090:80 ${{ secrets.RASHMI_DOCKERHUB_USERNAME }}/my-site-rashmi:latest