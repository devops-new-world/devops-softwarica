name: Deploy My website

on:
  push:
    branches:
    - "features/rashmi"
jobs:   
  docker-build:
    runs on: ubuntu-latest
    steps: 
      - name: checkout code 
        uses: actions/checkout@v4
      - name: docker build 
        working-directory: sites/rashmi
        run:
          docker build -t my_site_rashmi .
  deploy:
     runs-on: ubuntu-latest
     steps:
       - name: checkout code
         uses: actions/checkout@v4
            
       - name: Set up SSH
         run: |
           mkdir -p ~/.ssh
           echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
           chmod 600 ~/.ssh/id_rsa
           ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

       - name: Copy files via SSH
         run: |
          scp -i ~/.ssh/id_rsa sites/rashmi/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/trainer
