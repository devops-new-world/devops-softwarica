name: Deploy My website

on:
  push:
    branches:
    - "features/rashmi"
jobs:   
  docker-build and push:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout code 
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.RASHMI_DOCKER_USERNAME}}
          password: ${{secrets.RASHMI_DOCKER_TOKEN}}

      - name: Build and Push Docker Image/
        uses: docker/build-push-action@v6  
        with:
          context: ./sites/rashmi
          push: true
          tags: ${{secrets.RASHMI_DOCKER_USERNAME}}/my-site-rashmi:latest
          
  deploy:
     runs-on: ubuntu-latest
     steps:
       - name: checkout code
         uses: actions/checkout@v4
            
       - name: Set up SSH
         run: |
           mkdir -p ~/.ssh
           echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
           chmod 600 ~/.ssh/id_rsa
           ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

       - name: Copy files via SSH
         run: |
          scp -i ~/.ssh/id_rsa sites/rashmi/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/trainer
