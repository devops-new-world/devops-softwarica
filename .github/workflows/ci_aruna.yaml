name: Deploy Aruna's website

on:
  push:
    branches:
      - "**"
jobs:
  docker_build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}
          password: ${{ secrets.DOCKERHUB_TOKEN_ARUNA }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./sites/aruna
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}/aruna-site:latest

  deploy:
    needs: docker_build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.12.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}/aruna-site:latest
            docker stop aruna-site || true
            docker rm aruna-site || true
            docker run -d --name aruna-site -p 80:80 ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}/aruna-site:latest 