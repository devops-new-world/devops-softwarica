name: Provision Nginx Server

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: "Target Server IP Address"
        required: true
        type: string
      ssh_user:
        description: "SSH User"
        required: true
        type: string
        default: "ubuntu"

jobs:
  provision-nginx:
    name: Run Ansible Playbook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ inputs.server_ip }} >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        working-directory: ./infra/ansible/nginx/nginx
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          echo "[all]" > inventory.ini
          echo "${{ inputs.server_ip }} ansible_user=${{ inputs.ssh_user }} ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini
          ansible all -i inventory.ini -m ping
          ansible-playbook -i inventory.ini playbook.yml
