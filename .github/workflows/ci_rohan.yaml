name: Build and Deploy Rohan Website

on:
  push:
    branches:
      - "rohan"
      - "feature/rohan"
      - "bench_topper"
  workflow_dispatch:

jobs:
  docker-build:
    name: Build rohan Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker availability
        run: docker --version

      - name: Build Docker image
        run: |
          docker build -t rohan -f sites/rohan/Dockerfile sites/rohan

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: rohan-site
          path: sites/rohan/index.html

  deploy:
    name: Deploy rohan website
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_PASSWORD: ${{ secrets.PASSWORD }}
      DEPLOY_PATH: /var/www/html/rohan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: rohan-site
          path: deploy

      - name: Validate required secrets
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PASSWORD" ]; then
            echo "Missing required secrets: HOST, USERNAME, PASSWORD"
            exit 1
          fi

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy files via SSH
        run: |
          SCP_OPTS="-o StrictHostKeyChecking=accept-new -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa"

          sudo apt-get update -y
          sudo apt-get install -y sshpass
          sshpass -p "$SSH_PASSWORD" ssh $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
          sshpass -p "$SSH_PASSWORD" scp $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no deploy/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html"
