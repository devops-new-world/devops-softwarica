name: Build and Deploy Rohan Website

on:
  push:
    branches:
      - "rohan"
      - "feature/rohan"
      - "bench_topper"
  workflow_dispatch:

jobs:
  docker-build:
    name: Build rohan Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker availability
        run: docker --version

      - name: Build Docker image
        run: |
          docker build -t rohan -f sites/rohan/Dockerfile sites/rohan

  deploy:
    name: Deploy rohan website
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME || secrets.USER }}
      SSH_KEY: ${{ secrets.KEY }}
      SSH_PASSWORD: ${{ secrets.PASSWORD }}
      DEPLOY_PATH: /var/www/html/rohan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ]; then
            echo "Missing required secrets: HOST and USERNAME (or USER)"
            echo "DEPLOY_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$SSH_KEY" ] && [ -z "$SSH_PASSWORD" ]; then
            echo "No KEY/PASSWORD provided. Deployment will be skipped safely."
            echo "DEPLOY_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "DEPLOY_ENABLED=true" >> "$GITHUB_ENV"

      - name: Set up SSH
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          install -m 700 -d ~/.ssh
          USE_KEY_AUTH=false

          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ]; then
            echo "Missing required secrets: HOST and/or USERNAME"
            exit 1
          fi

          if [ -n "$SSH_KEY" ]; then
            KEY_CONTENT="$SSH_KEY"
            KEY_CONTENT="${KEY_CONTENT#\"}"
            KEY_CONTENT="${KEY_CONTENT%\"}"

            if echo "$KEY_CONTENT" | grep -q '\\n'; then
              printf '%b' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
            else
              printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
            fi

            if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_rsa 2>/dev/null; then
              printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/id_rsa 2>/dev/null || true
            fi

            chmod 600 ~/.ssh/id_rsa

            if ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
              USE_KEY_AUTH=true
            else
              echo "Invalid SSH key in secret KEY; continuing with PASSWORD fallback if available."
            fi
          fi

          if [ "$USE_KEY_AUTH" = false ] && [ -z "$SSH_PASSWORD" ]; then
            echo "No valid KEY and PASSWORD is not set. Deployment will be skipped safely."
            echo "DEPLOY_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "USE_KEY_AUTH=$USE_KEY_AUTH" >> "$GITHUB_ENV"
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy files via SSH
        if: env.DEPLOY_ENABLED == 'true'
        run: |
          SCP_OPTS="-o StrictHostKeyChecking=accept-new -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa"

          if [ "$USE_KEY_AUTH" = "true" ]; then
            ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes $SCP_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
            scp -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o PreferredAuthentications=publickey $SCP_OPTS sites/rohan/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html" && exit 0
            echo "Key-based auth failed, attempting password fallback if PASSWORD secret is set..."
          fi

          if [ -n "$SSH_PASSWORD" ]; then
            sudo apt-get update -y
            sudo apt-get install -y sshpass
            sshpass -p "$SSH_PASSWORD" ssh $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
            sshpass -p "$SSH_PASSWORD" scp $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no sites/rohan/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html" && exit 0
          fi

          echo "Deployment failed: authentication unsuccessful. Verify KEY matches USERNAME@HOST, or set PASSWORD secret."
          exit 1

      - name: Skip deploy (no valid auth)
        if: env.DEPLOY_ENABLED != 'true'
        run: echo "Skipping rohan deploy safely because required/auth secrets are missing or invalid."
