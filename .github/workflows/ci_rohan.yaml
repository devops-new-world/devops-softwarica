name: Build and Deploy Rohan Website

on:
  push:
    branches:
      - "rohan"
      - "feature/rohan"
      - "bench_topper"
  workflow_dispatch:

jobs:
  docker-build:
    name: Build rohan Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker availability
        run: docker --version

      - name: Build Docker image
        run: |
          docker build -t rohan -f sites/rohan/Dockerfile sites/rohan

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: rohan-site
          path: sites/rohan/index.html

  deploy:
    name: Deploy rohan website
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_KEY: ${{ secrets.KEY }}
      SSH_PASSWORD: ${{ secrets.PASSWORD }}
      DEPLOY_PATH: /var/www/html/rohan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: rohan-site
          path: deploy

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          USE_KEY_AUTH=false
          DEPLOY_ENABLED=true

          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ]; then
            echo "Missing HOST or USERNAME secret; deploy will be skipped."
            DEPLOY_ENABLED=false
          fi

          if [ "$DEPLOY_ENABLED" = true ] && [ -n "$SSH_KEY" ]; then
            KEY_CONTENT="$SSH_KEY"
            KEY_CONTENT="${KEY_CONTENT#\"}"
            KEY_CONTENT="${KEY_CONTENT%\"}"

            if echo "$KEY_CONTENT" | grep -q '\\n'; then
              printf '%b' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
            else
              printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
            fi

            if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_rsa 2>/dev/null; then
              printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/id_rsa 2>/dev/null || true
            fi

            chmod 600 ~/.ssh/id_rsa

            if ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
              USE_KEY_AUTH=true
            else
              echo "Invalid SSH key in secret KEY; continuing with PASSWORD fallback if available."
            fi
          fi

          if [ "$DEPLOY_ENABLED" = true ] && [ "$USE_KEY_AUTH" = false ] && [ -z "$SSH_PASSWORD" ]; then
            echo "No valid KEY and PASSWORD is not set; deploy will be skipped."
            DEPLOY_ENABLED=false
          fi

          echo "USE_KEY_AUTH=$USE_KEY_AUTH" >> "$GITHUB_ENV"
          echo "DEPLOY_ENABLED=$DEPLOY_ENABLED" >> "$GITHUB_ENV"
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy files via SSH
        run: |
          SCP_OPTS="-o StrictHostKeyChecking=accept-new -o PubkeyAcceptedAlgorithms=+ssh-rsa -o HostkeyAlgorithms=+ssh-rsa"

          if [ "$DEPLOY_ENABLED" != "true" ]; then
            echo "Skipping deploy because authentication or host details are unavailable."
            exit 0
          fi

          sudo apt-get update -y
          sudo apt-get install -y sshpass

          if [ "$USE_KEY_AUTH" = "true" ]; then
            ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes $SCP_OPTS "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
            scp -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o PreferredAuthentications=publickey $SCP_OPTS deploy/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html" && exit 0
            echo "Key-based auth failed, attempting password fallback if PASSWORD secret is set..."
          fi

          if [ -n "$SSH_PASSWORD" ]; then
            sshpass -p "$SSH_PASSWORD" ssh $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"
            sshpass -p "$SSH_PASSWORD" scp $SCP_OPTS -o PreferredAuthentications=password -o PubkeyAuthentication=no deploy/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html" && exit 0
          fi

          echo "Deployment skipped: authentication unsuccessful. Verify KEY matches USERNAME@HOST, or set PASSWORD secret."
          exit 0
