name: Deploy Rohan Website

on:
  push:
    branches:
    - "rohan"
    - "feature/rohan"
  workflow_dispatch:
jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Check Docker availability
              run: docker --version
            
            - name: Build Docker image
              run: |
                docker build -t rohan -f sites/rohan/Dockerfile sites/rohan
