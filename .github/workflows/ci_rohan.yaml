name: Deploy Rohan Website

on:
  push:
    branches:
    - "rohan"
    - "feature/rohan"
  workflow_dispatch:
jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Check Docker availability
              run: docker --version
            
            - name: Build Docker image
              run: |
                docker build -t rohan -f sites/rohan/Dockerfile sites/rohan
            
            - name: Login to Docker Hub
              run: |
                echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            - name: Tag and push Docker image
              run: |
                docker tag rohan ${{ secrets.DOCKER_USERNAME }}/rohan:latest
                docker push ${{ secrets.DOCKER_USERNAME }}/rohan:latest
        
    deploy:
        needs: docker-build
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            
            - name: Set up SSH
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa
                ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

            - name: Copy files via SSH
              run: |
                scp -i ~/.ssh/id_rsa sites/rohan/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/rohan
