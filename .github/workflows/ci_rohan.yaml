name: Deploy Rohan Website

on:
  push:
    branches:
      - "rohan"
      - "feature/rohan"
  workflow_dispatch:

jobs:
  docker-build:
    name: Build rohan Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker availability
        run: docker --version

      - name: Build Docker image
        run: |
          docker build -t rohan -f sites/rohan/Dockerfile sites/rohan

  deploy:
    name: Deploy rohan website
    runs-on: ubuntu-latest
    needs: docker-build
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_KEY: ${{ secrets.KEY }}
      DEPLOY_PATH: /var/www/html/rohan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "Missing one or more required secrets: HOST, USERNAME, KEY"
            exit 1
          fi

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity
        run: |
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" "echo SSH connection successful"

      - name: Create remote directory
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new sites/rohan/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/index.html"
