name: Deploy My website

on:
  push:
    branches:
      - "feature1/oskar"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker build
        run: |
          docker build -t oskar:latest .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/id_rsa sites/oskar/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/trainerror
