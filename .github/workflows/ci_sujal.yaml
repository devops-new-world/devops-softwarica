name: Deploy My Website

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build Docker Image
        run: |
          docker build -t sujal -f Dockerfile --build-context sites/sujal=./sites/sujal .

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build        # ← waits for docker-build to succeed first
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SUJAL_SSH }}" > ~/.ssh/SUJAL_SSH
          chmod 600 ~/.ssh/SUJAL_SSH
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/SUJAL_SSH \
            sites/sujal/index.html \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/sujal/