name: Deploy Sujal Website

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: sujalneupane
          password: ${{ secrets.SUJAL_DOCKER_KEY }}

      - name: Build and Push Docker Image
        run: |
          docker build -t sujalneupane/devops-class:latest .
          docker push sujalneupane/devops-class:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SUJAL_SSH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa sujal@3.108.54.194 "echo SSH_CONNECTION_SUCCESS"

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/id_rsa \
            sites/sujal/index.html \
            sujal@3.108.54.194:/var/www/html/sujal/