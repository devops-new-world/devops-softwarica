name: Docker build & deploy

on:
  push:
    branches:
      - "feature/pravesh"
jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -f sites/pravesh/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/pravesh:latest sites/pravesh
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pravesh:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: pravesh
          key: ${{ secrets.PRAVESH }}
          port: 22
          source: "sites/pravesh/index.html"
          strip_components: 2
          target: "/var/www/html/pravesh/"
          overwrite: true