name: Deploy Rijen Full-Stack App

on:
  push:
    branches:
      - "bench-hamro"
    paths:
      - "devops-softwarica/HamroCRUD/backend/**"
      - "devops-softwarica/HamroCRUD/frontend/**"
      - "devops-softwarica/HamroCRUD/docker-compose.yaml"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rezenn
          password: ${{ secrets.RIJEN_DOCKER_TOKEN }}

      - name: Build & Push Backend
        run: |
          docker build -t rezenn/rijen-backend:latest ./devops-softwarica/HamroCRUD/backend
          docker push rezenn/rijen-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rezenn
          password: ${{ secrets.RIJEN_DOCKER_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build -t rezenn/rijen-frontend:latest ./devops-softwarica/HamroCRUD/frontend
          docker push rezenn/rijen-frontend:latest

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.RIJEN_SECRET }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          rijen@${{ secrets.HOST }} "echo SSH OK"

      - name: Copy docker-compose to server
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          devops-softwarica/HamroCRUD/docker-compose.yaml \
          rijen@${{ secrets.HOST }}:~/rijen/docker-compose.yaml

      - name: Pull images & restart containers
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          rijen@${{ secrets.HOST }} "
            cd ~/rijen
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
