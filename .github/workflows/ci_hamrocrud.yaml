name: Deploy HamroCRUD website

on:
  push:
    branches:
      - "bench-hamro"

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: rezenn
          password: ${{ secrets.RIJEN_DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t rezenn/rijen:latest .

      - name: Push Docker Image
        run: docker push rezenn/rijen:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.RIJEN_SECRET }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H eef1df54591c.mylabserver.com >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          rijen@eef1df54591c.mylabserver.com "echo SSH OK"

      - name: Copy files via SCP
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
          sites/HamroCRUD/index.html \
          rijen@eef1df54591c.mylabserver.com:/var/www/html/rijen/
