name: Deploy HamroCRUD website

on:
  push:
    branches:
      - "bench-hamro"

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: rezenn
          password: ${{ secrets.RIJEN_DOCKER_TOKEN }}

      - name: Build Docker Image
        run: docker build -t rezenn/rijen:latest .

      - name: Push Docker Image
        run: docker push rezenn/rijen:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Test SSH Connection
        run: |
          sshpass -p 'changeme' ssh -o StrictHostKeyChecking=no \
          ubuntu@98.92.66.38 "echo SSH OK"

      - name: Deploy Docker Container on Server
        run: |
          sshpass -p 'changeme' ssh -o StrictHostKeyChecking=no \
          ubuntu@98.92.66.38 "
            docker pull rezenn/rijen:latest &&
            docker stop hamrocrud 2>/dev/null || true &&
            docker rm hamrocrud 2>/dev/null || true &&
            docker run -d --name hamrocrud -p 9092:80 rezenn/rijen:latest
          "
