name: Deploy bench-hamroCRUD
#
on:
  workflow_dispatch:
    inputs:
      access_key_id:
        description: "AWS Access Key ID"
        required: true
        type: string
      secret_access_key:
        description: "AWS Secret Access Key"
        required: true
        type: string
      default_region:
        description: "AWS Default Region"
        required: true
        type: string
        default: "us-east-1"
      vm_type:
        description: "Type of VM to deploy"
        required: true
        type: choice
        options:
          - "general"
          - "cluster"
        default: "general"
      server_count:
        description: "EC2 Instance Count (Server Nodes, max 7)"
        required: true
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
          - "7"
        default: "2"
      machine_spec:
        description: "Machine Instance Type"
        required: true
        type: choice
        options:
          - "t3.small"
          - "t3.medium"
        default: "t3.small"

jobs:
  terraform-deploy:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.access_key_id }}
          aws-secret-access-key: ${{ inputs.secret_access_key }}
          aws-region: ${{ inputs.default_region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Setup SSH public key
        run: |
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_public_key.pub

      - name: Terraform Init
        working-directory: ./infra/terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra/terraform
        run: |
          terraform plan \
            -var="aws_region=${{ inputs.default_region }}" \
            -var="instance_type=${{ inputs.machine_spec }}" \
            -var="server_count=${{ inputs.server_count }}" \
            -var="vm_type=${{ inputs.vm_type }}" \
            -var="project_name=k8s-cluster" \
            -var="public_key_file=/tmp/ssh_public_key.pub" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ./infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        working-directory: ./infra/terraform
        run: terraform output
