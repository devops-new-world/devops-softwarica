name: FINAL Docker Build and Deploy

on:
  push:
    branches:
      - bench_first

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ravijaiswal230392/ravi:latest ./sites/ravijaiswal
          docker push ravijaiswal230392/ravi:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker pull ravijaiswal230392/ravi:latest
            docker stop ravi-app || true
            docker rm ravi-app || true
            docker run -d -p 8091:80 --name ravi-app ravijaiswal230392/ravi:latest