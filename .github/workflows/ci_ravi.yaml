name: FINAL Docker Build and Push

on:
  push:
    branches:
      - bench_first
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_RAV }}
          password: ${{ secrets.DOKERHUB_PAT_RAV }}

      - name: Build Docker Image
        run: docker build -t ravijaiswal230392/ravi:latest ./sites/ravijaiswal

      - name: Push Docker Image
        run: docker push ravijaiswal230392/ravi:latest

  deploy:
    needs: docker-build-and-push   # ✅ FIXED HERE
    runs-on: ubuntu-latest

    steps:
      - name: Simulate Deploy
        run: echo "Deploy step completed successfully 🚀"