name: Deploy Natak website

on:
  push:
    branches:
      - "bench-natak"

jobs:
  docker_build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}
          password: ${{ secrets.NATAK_DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest ./sites/natak
          docker push ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest

  deploy:
    needs: docker_build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.SAMBANDHA_SERVER_USERNAME }}
          key: ${{ secrets.SAMBANDHA_SSH_KEY }}
          script: |
            docker pull ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest
            docker stop natak-site || true
            docker rm natak-site || true
            docker run -d --name natak-site -p 9092:80 ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest
