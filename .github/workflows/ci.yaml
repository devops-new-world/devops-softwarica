name: Deploy Trainer Website

on:
  push:
    branches:
      - "trainer"
      - "feature/trainer"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy trainer website
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USERNAME }}
      SSH_KEY: ${{ secrets.KEY }}
      DEPLOY_PATH: /var/www/html/trainer
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_KEY" ]; then
            echo "Missing one or more required secrets: HOST, USERNAME, KEY"
            exit 1
          fi

      - name: Set up SSH
        run: |
          install -m 700 -d ~/.ssh
          KEY_CONTENT="$SSH_KEY"
          KEY_CONTENT="${KEY_CONTENT#\"}"
          KEY_CONTENT="${KEY_CONTENT%\"}"

          if echo "$KEY_CONTENT" | grep -q '\\n'; then
            printf '%b' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
          else
            printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
          fi

          if ! grep -q "BEGIN .*PRIVATE KEY" ~/.ssh/id_rsa 2>/dev/null; then
            printf '%s' "$KEY_CONTENT" | base64 -d > ~/.ssh/id_rsa 2>/dev/null || true
          fi

          chmod 600 ~/.ssh/id_rsa

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "Invalid SSH key in secret KEY. Save the full private key (including BEGIN/END lines) or a valid base64-encoded private key."
            exit 1
          fi

          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new sites/trainer/index.html "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"
