name: docker-ci-cd

on:
  push:
    branches:
      - feature1/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.ABHISHEK_DOCKER_TOKEN }}" | docker login -u "${{ secrets.ABHISHEK_DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/mysite_abhishek:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/mysite_abhishek:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy (simulation)
        run: |
          docker pull ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/mysite_abhishek:latest
          docker stop mysite || true
          docker rm mysite || true
          docker run -d -p 8080:80 --name mysite ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/mysite_abhishek:latest
