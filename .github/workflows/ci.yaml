name: Deploy My website

on:
  push:
    branches:
    - "**"
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}
                password: ${{ secrets.DOCKERHUB_TOKEN_ARUNA }}

            - name: Build and Push Aruna image
              uses: docker/build-push-action@v6
              with:
                context: ./sites/aruna
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}/aruna-site:latest
            
            - name: Set up SSH
              run: |
                mkdir -p ~/.ssh
                echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa
                ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

            - name: Copy files via SSH
              run: |
                scp -i ~/.ssh/id_rsa sites/trainer/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/trainer
