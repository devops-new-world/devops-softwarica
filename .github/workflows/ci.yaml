name: Docker build & deploy

on:
  push:
    branches:
      - feature/prayug

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: prayug1
          password: ${{ secrets.PRAYUG_DOCKER_KEY }}

      - name: Build and Push Docker Image
        run: |
          docker build -t prayug1/devops-class:latest .
          docker push prayug1/devops-class:latest

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.PRAYUG_USERNAME }}
          key: ${{ secrets.PRAYUG_SSH_KEY}}
          source: "sites/prayug/index.html"
          target: /var/www/html/prayug/
          strip_components: 2