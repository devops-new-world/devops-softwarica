name: Deploy Static Website

on:
  push:
    branches:
      - feature/yubin

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build -t yubin .

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: eef1df54591c.mylabserver.com
          username: root
          key: ${{ secrets.YUBIN_SECRET_KEY }}
          passphrase: ${{ secrets.YUBIN_PASSPHRASE }}
          source: "sites/yubin/index.html"
          target: /var/www/html/yubin/
          strip_components: 2