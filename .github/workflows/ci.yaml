name: Bench-Shothai CI/CD

on:
  push:
    tags:
      - "**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.ABHISHEK_DOCKER_TOKEN }}" | docker login -u ${{ secrets.ABHISHEK_DOCKER_USERNAME }} --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/bench-shothai-site:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/bench-shothai-site:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Simulate Deployment
        run: |
          echo "🚀 Deploying Bench-Shothai site..."
          echo "Pulling image..."
          echo "docker pull ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/bench-shothai-site:latest"
          echo "Stopping old container..."
          echo "docker stop group_site || true"
          echo "Removing old container..."
          echo "docker rm group_site || true"
          echo "Starting new container on port 8020..."
          echo "docker run -d -p 8020:80 --name group_site ${{ secrets.ABHISHEK_DOCKER_USERNAME }}/bench-shothai-site:latest"
          echo "✅ Deployment simulated successfully!"

