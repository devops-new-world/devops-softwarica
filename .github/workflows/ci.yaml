name: Deploy My website

on:
  push:
    branches:
    - "**"
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            
            - name: Set up SSH
              run: |
                mkdir -p ~/.ssh
                KEY_CONTENT="${{ secrets.KEY }}"
                if echo "$KEY_CONTENT" | grep -q '\\n'; then
                  printf '%b' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
                else
                  printf '%s' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_rsa
                fi
                chmod 600 ~/.ssh/id_rsa
                ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null
                ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

            - name: Copy files via SSH
              run: |
                scp -i ~/.ssh/id_rsa sites/trainer/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/trainer
