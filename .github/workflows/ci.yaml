name: docker-build

on:
  push:
    branches:
      - feature1/**

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify structure
        run: |
          if [ ! -f "sites/abhishekdh/index.html" ]; then
            echo "Missing index.html"
            exit 1
          fi

      - name: Build Docker Image
        run: docker build -t my-site .
