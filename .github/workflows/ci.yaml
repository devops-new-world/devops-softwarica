name: Deployingggggg
on:
  push:
    branches:
      - bench-villians
jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: docker build
        run: |
          docker build -t yubin -f ./sites/yubin/Dockerfile .
    

  # docker-hub-push:
  #   needs: docker-build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4


      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: yustha
          password: ${{ secrets.YUBIN_DOCKER_KEY }}

      - name: Push to Docker Hub
        run: |
          docker tag yubin yustha/devops:0.1.0
          docker push yustha/devops:0.1.0

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Copy files via SSH
        uses: appleboy/scp-action@v1
        with:
          host: eef1df54591c.mylabserver.com
          username: root
          key: ${{ secrets.YUBIN_SECRET_KEY }}
          passphrase: ${{ secrets.YUBIN_PASSPHRASE }}
          source: "sites/yubin/index.html"
          target: /var/www/html/yubin/
          strip_components: 2