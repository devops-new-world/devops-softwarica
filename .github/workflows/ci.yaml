name: Deploy My website

on:
  push:
    branches:
    - "**"
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}
                password: ${{ secrets.DOCKERHUB_TOKEN_ARUNA }}

            - name: Build and Push Aruna image
              uses: docker/build-push-action@v6
              with:
                context: ./sites/aruna
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME_ARUNA }}/aruna-site:latest
            
            - name: Install sshpass
              run: sudo apt-get update && sudo apt-get install -y sshpass

            - name: Copy files via SSH with password
              run: |
                sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -o StrictHostKeyChecking=no sites/aruna/index.html ${{ secrets.USERNAME1 }}@${{ secrets.HOST1 }}:/var/www/html/aruna
