name: Deploy rijen's website

on:
  push:
    branches:
      - "feature/rijen"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.RIJEN_DOCKER_TOKEN }}" | docker login -u rezenn --password-stdin

      - name: Build Docker image
        run: docker build -t rezenn/rijen:latest .

      - name: Push to Docker Hub
        run: docker push rezenn/rijen:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.RIJEN_SECRET }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy files via SCP
        run: |
          scp -i ~/.ssh/id_rsa sites/rijen/index.html \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/rijen/
