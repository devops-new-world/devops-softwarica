name: Deploy rijen's website

on:
  push:
    branches:
      - "feature/rijen"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug files
        run: ls -R

      - name: Build Docker image
        run: docker build -t rijen .

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Ensure remote folder exists
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p /var/www/html/rijen"

      - name: Copy files
        run: |
          scp -i ~/.ssh/id_rsa sites/rijen/index.html ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/html/rijen/
