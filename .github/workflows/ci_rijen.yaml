name: Deploy My website

on:
  push:
    branches:
      - "feature/rijen"
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy files via SSH
        run: |
          scp -i ~/.ssh/id_rsa sites/rijen/index.html \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/tmp/index.html

          ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "sudo mv /tmp/index.html /var/www/html/rijen/index.html"