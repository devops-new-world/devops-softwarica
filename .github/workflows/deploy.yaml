name: Deploy Natak Website with SAST

on:
  push:
    branches:
      - "o"

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config auto --error ./sites/natak

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: ./sites/natak
          severity: HIGH,CRITICAL
          exit-code: 1

  docker_build:
    name: Build and Push Docker Image
    needs: [semgrep, trivy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}
          password: ${{ secrets.NATAK_DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest ./sites/natak
          docker push ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest

  deploy:
    name: Deploy to Server
    needs: docker_build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SAMBANDHA_SERVER_HOST }}
          username: ${{ secrets.SAMBANDHA_SERVER_USERNAME }}
          key: ${{ secrets.SAMBANDHA_SSH_KEY }}
          script: |
            docker pull ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest
            docker stop natak-site || true
            docker rm natak-site || true
            docker run -d --name natak-site -p 9093:80 ${{ secrets.SAMBANDHA_DOCKER_USERNAME }}/bench-natak:latest
