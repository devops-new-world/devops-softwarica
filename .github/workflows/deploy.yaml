name: Deploy to Remote Server

on:
  push:
    branches:
      - bench-mates

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        
      - name: Copy files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: eef1df54591c.mylabserver.com
          username: ${{ secrets.PRATYUSH_SERVER_USERNAME }}
          key: ${{ secrets.PRATYUSH_SSH_KEY }}
          source: "./*"
          target: /home/pratyush/

      - name: Run Docker Compose on remote server
        run: |
          ssh -i ${{ secrets.PRATYUSH_SSH_KEY }} ${{ secrets.PRATYUSH_SERVER_USERNAME }}@eef1df54591c.mylabserver.com "cd /home/pratyush/simon-game && docker compose up -d"