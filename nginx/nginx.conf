# This is a comment
events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name softwarika-devops-lab.openlabfree.com localhost;

        # Main Next.js application (Landing page and Trainer backend module)
        location / {
            proxy_pass http://lab-app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Dynamic routing to student containers. 
        # Using a regex to match /<group_name> and proxy to that container name
        # Note: This requires the containers to be reachable by their group name in the same Docker network on port 80 or their exposed port.
        # This setup assumes student containers expose port 80.
        location ~ ^/([^/]+)(/.*)?$ {
            # Don't match the known Next.js internal paths or trainer paths
            if ($1 ~* "^(trainer|api|_next)$") {
                break; 
            }
            resolver 127.0.0.11 valid=30s;
            set $student_container $1;
            
            # Assuming student apps run inside docker network with container name = group name listening on port 80
            proxy_pass http://$student_container:80$2;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
