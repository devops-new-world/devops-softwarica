version: '3.9'

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-please}
    volumes:
      - simon_data:/app/data   # persists the SQLite DB
    expose:
      - "3000"

  nginx:
    image: nginx:alpine 
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  simon_data:
