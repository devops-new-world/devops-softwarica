services:
  backend:
    image: ${DOCKERHUB_USERNAME}/bench-natak-backend:${IMAGE_TAG:-latest}
    container_name: natak-backend
    environment:
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
    expose:
      - "5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME}/bench-natak-frontend:${IMAGE_TAG:-latest}
    container_name: natak-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
