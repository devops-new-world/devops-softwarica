<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamro CRUD App</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0b0c0f;
        --surface: #13151a;
        --border: #1f2230;
        --accent: #c8f04a;
        --accent2: #4af0c8;
        --danger: #f04a6e;
        --text: #e8eaf0;
        --muted: #5a5e72;
        --radius: 12px;
      }

      html,
      body {
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "DM Mono", monospace;
      }

      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse-ring {
        0% {
          box-shadow: 0 0 0 0 rgba(200, 240, 74, 0.35);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(200, 240, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(200, 240, 74, 0);
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 16px 80px;
        background:
          radial-gradient(
            ellipse 80% 40% at 50% -10%,
            #c8f04a12 0%,
            transparent 70%
          ),
          var(--bg);
      }

      header {
        text-align: center;
        margin-bottom: 48px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 16px;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: 20px;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-ring 2s ease infinite;
        display: inline-block;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: clamp(2rem, 6vw, 3.2rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      h1 span {
        color: var(--accent);
        text-shadow: 0 0 40px #c8f04a66;
      }

      #subtitle {
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
        letter-spacing: 0.04em;
      }

      .input-card {
        width: 100%;
        max-width: 560px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 28px;
        display: flex;
        gap: 10px;
      }

      #new-item-input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      #new-item-input:focus {
        border-color: var(--accent);
      }

      #add-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 18px;
        background: var(--border);
        color: var(--muted);
        border: none;
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 13px;
        cursor: not-allowed;
        transition:
          background 0.2s,
          color 0.2s,
          box-shadow 0.2s;
        white-space: nowrap;
      }
      #add-btn.active {
        background: var(--accent);
        color: #0b0c0f;
        cursor: pointer;
      }
      #add-btn.active:hover {
        box-shadow: 0 0 20px #c8f04a55;
      }

      .list-wrap {
        width: 100%;
        max-width: 560px;
      }

      #items-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .item-row {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 18px;
        animation: slideIn 0.3s ease both;
        transition:
          border-color 0.2s,
          opacity 0.3s;
      }
      .item-row:hover {
        border-color: var(--muted);
      }
      .item-row.deleting {
        opacity: 0.4;
      }

      .item-index {
        min-width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--border);
        border-radius: 6px;
        font-size: 11px;
        color: var(--muted);
        flex-shrink: 0;
      }

      .item-name {
        flex: 1;
        font-size: 14px;
        letter-spacing: 0.01em;
      }

      .item-edit-input {
        flex: 1;
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--accent);
        outline: none;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 14px;
        padding: 2px 4px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }

      .action-btn {
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border-radius: 8px;
        cursor: pointer;
        transition:
          background 0.15s,
          box-shadow 0.15s;
        flex-shrink: 0;
      }

      .btn-edit {
        border: 1px solid rgba(74, 240, 200, 0.27);
        color: var(--accent2);
      }
      .btn-delete {
        border: 1px solid rgba(240, 74, 110, 0.27);
        color: var(--danger);
      }
      .btn-save {
        border: 1px solid rgba(200, 240, 74, 0.27);
        color: var(--accent);
      }
      .btn-cancel {
        border: 1px solid rgba(90, 94, 114, 0.27);
        color: var(--muted);
      }

      .btn-edit:hover {
        background: rgba(74, 240, 200, 0.1);
        box-shadow: 0 0 8px rgba(74, 240, 200, 0.27);
      }
      .btn-delete:hover {
        background: rgba(240, 74, 110, 0.1);
        box-shadow: 0 0 8px rgba(240, 74, 110, 0.27);
      }
      .btn-save:hover {
        background: rgba(200, 240, 74, 0.1);
        box-shadow: 0 0 8px rgba(200, 240, 74, 0.27);
      }
      .btn-cancel:hover {
        background: rgba(90, 94, 114, 0.1);
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      .empty-state {
        text-align: center;
        padding: 48px 24px;
        background: var(--surface);
        border: 1px dashed var(--border);
        border-radius: var(--radius);
        color: var(--muted);
        font-size: 13px;
      }
      .empty-icon {
        font-size: 32px;
        margin-bottom: 12px;
      }

      #toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        z-index: 999;
        background: var(--surface);
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 13px;
        padding: 10px 20px;
        border-radius: var(--radius);
        animation: slideIn 0.25s ease;
        pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="badge">
        <span class="badge-dot"></span>
        Live · MongoDB Atlas
      </div>
      <h1>Hamro <span>CRUD</span> App</h1>
      <p id="subtitle">0 items in collection</p>
    </header>

    <div class="input-card">
      <input id="new-item-input" type="text" placeholder="Enter item name…" />
      <button id="add-btn">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Item
      </button>
    </div>

    <div class="list-wrap">
      <div
        id="loading"
        style="text-align: center; padding: 48px; color: var(--muted)"
      >
        <span class="spinner"></span>
        <p style="margin-top: 12px; font-size: 13px">Loading items…</p>
      </div>
      <ul id="items-list" style="display: none"></ul>
      <div id="empty-state" class="empty-state" style="display: none">
        <div class="empty-icon">◎</div>
        <p>No items yet.</p>
        <p style="margin-top: 4px">Add something above to get started.</p>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const API = "http://localhost:5000";

      const input = document.getElementById("new-item-input");
      const addBtn = document.getElementById("add-btn");
      const list = document.getElementById("items-list");
      const loading = document.getElementById("loading");
      const emptyEl = document.getElementById("empty-state");
      const subtitle = document.getElementById("subtitle");
      const toastEl = document.getElementById("toast");

      let toastTimer;

      // ── Toast ──────────────────────────────────────────────────────────────────
      function showToast(msg, type = "ok") {
        clearTimeout(toastTimer);
        const color = type === "error" ? "var(--danger)" : "var(--accent)";
        toastEl.textContent = msg;
        toastEl.style.display = "block";
        toastEl.style.border = `1px solid ${color}`;
        toastEl.style.color = color;
        toastEl.style.boxShadow = `0 0 20px ${type === "error" ? "#f04a6e44" : "#c8f04a44"}`;
        toastTimer = setTimeout(() => {
          toastEl.style.display = "none";
        }, 2200);
      }

      // ── Input state ────────────────────────────────────────────────────────────
      input.addEventListener("input", () => {
        if (input.value.trim()) {
          addBtn.classList.add("active");
        } else {
          addBtn.classList.remove("active");
        }
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") addItem();
      });
      addBtn.addEventListener("click", addItem);

      // ── Fetch ──────────────────────────────────────────────────────────────────
      async function fetchItems() {
        try {
          const res = await fetch(`${API}/items`);
          const items = await res.json();
          renderItems(items);
        } catch {
          showToast("Failed to fetch items", "error");
          loading.style.display = "none";
        }
      }

      function renderItems(items) {
        loading.style.display = "none";
        subtitle.textContent = `${items.length} item${items.length !== 1 ? "s" : ""} in collection`;

        if (items.length === 0) {
          list.style.display = "none";
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";
        list.style.display = "flex";
        list.innerHTML = "";

        items.forEach((item, i) => {
          const li = buildRow(item, i);
          list.appendChild(li);
        });
      }

      // ── Build row ──────────────────────────────────────────────────────────────
      function buildRow(item, index) {
        const li = document.createElement("li");
        li.className = "item-row";
        li.style.animationDelay = `${index * 55}ms`;

        li.innerHTML = `
      <span class="item-index">${String(index + 1).padStart(2, "0")}</span>
      <span class="item-name">${escHtml(item.name)}</span>
      <div class="actions">
        <button class="action-btn btn-edit" title="Edit">${iconEdit()}</button>
        <button class="action-btn btn-delete" title="Delete">${iconTrash()}</button>
      </div>
    `;

        const nameEl = li.querySelector(".item-name");
        const editBtn = li.querySelector(".btn-edit");
        const deleteBtn = li.querySelector(".btn-delete");

        // ── Delete ──
        deleteBtn.addEventListener("click", async () => {
          li.classList.add("deleting");
          deleteBtn.innerHTML = spinner();
          try {
            await fetch(`${API}/items/${item._id}`, { method: "DELETE" });
            showToast("Item removed");
            fetchItems();
          } catch {
            showToast("Failed to delete", "error");
            li.classList.remove("deleting");
            deleteBtn.innerHTML = iconTrash();
          }
        });

        // ── Edit ──
        editBtn.addEventListener("click", () => {
          const input = document.createElement("input");
          input.className = "item-edit-input";
          input.value = item.name;
          nameEl.replaceWith(input);
          input.focus();

          const actionsEl = li.querySelector(".actions");
          actionsEl.innerHTML = `
        <button class="action-btn btn-save"  title="Save">${iconCheck()}</button>
        <button class="action-btn btn-cancel" title="Cancel">${iconX()}</button>
      `;

          const saveBtn = actionsEl.querySelector(".btn-save");
          const cancelBtn = actionsEl.querySelector(".btn-cancel");

          const save = async () => {
            const newName = input.value.trim();
            if (!newName || newName === item.name) {
              cancel();
              return;
            }
            saveBtn.innerHTML = spinner();
            try {
              await fetch(`${API}/items/${item._id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: newName }),
              });
              showToast("Item updated ✓");
              fetchItems();
            } catch {
              showToast("Failed to update", "error");
              cancel();
            }
          };

          const cancel = () => {
            input.replaceWith(nameEl);
            actionsEl.innerHTML = `
          <button class="action-btn btn-edit" title="Edit">${iconEdit()}</button>
          <button class="action-btn btn-delete" title="Delete">${iconTrash()}</button>
        `;
            actionsEl
              .querySelector(".btn-edit")
              .addEventListener("click", () => editBtn.click());
            actionsEl
              .querySelector(".btn-delete")
              .addEventListener("click", () => deleteBtn.click());
          };

          saveBtn.addEventListener("click", save);
          cancelBtn.addEventListener("click", cancel);
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") save();
            if (e.key === "Escape") cancel();
          });
        });

        return li;
      }

      // ── Add ────────────────────────────────────────────────────────────────────
      async function addItem() {
        const name = input.value.trim();
        if (!name) return;
        addBtn.innerHTML = `<span class="spinner"></span> Add Item`;
        addBtn.classList.remove("active");
        try {
          await fetch(`${API}/items`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name }),
          });
          input.value = "";
          showToast("Item added ✓");
          fetchItems();
        } catch {
          showToast("Failed to add item", "error");
        } finally {
          addBtn.innerHTML = `${iconPlus()} Add Item`;
        }
      }

      // ── Icon helpers ───────────────────────────────────────────────────────────
      function escHtml(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function spinner() {
        return `<span class="spinner"></span>`;
      }
      function iconPlus() {
        return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
      }
      function iconEdit() {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      }
      function iconTrash() {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
      }
      function iconCheck() {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
      }
      function iconX() {
        return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      }

      // ── Init ───────────────────────────────────────────────────────────────────
      fetchItems();
    </script>
  </body>
</html>
